---
- name: Install Python3 and pip
  apt:
    name:
      - python3
      - python3-pip
    state: present
    update_cache: yes

- name: Install Flask
  pip:
    name: flask
    executable: pip3

- name: Copy Flask app
  copy:
    src: app.py
    dest: "{{ flask_app_dest }}"
    owner: "{{ flask_user }}"

- name: Create Flask environment file
  copy:
    dest: "{{ flask_env_file }}"
    content: |
      DB_USER={{ db_user }}
      DB_PASSWORD={{ db_password }}
    mode: '0600'
    owner: "{{ flask_user }}"

- name: Create Flask systemd service
  copy:
    dest: /etc/systemd/system/flask.service
    content: |
      [Unit]
      Description=Flask Web Application
      After=network.target

      [Service]
      User={{ flask_user }}
      EnvironmentFile={{ flask_env_file }}
      ExecStart=/usr/bin/python3 {{ flask_app_dest }}
      Restart=always
      RestartSec=3

      [Install]
      WantedBy=multi-user.target

- name: Reload systemd daemon
  systemd:
    daemon_reload: yes

- name: Enable and restart Flask service
  systemd:
    name: flask
    state: restarted
    enabled: yes