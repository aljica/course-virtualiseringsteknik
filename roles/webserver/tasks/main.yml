---
- name: Install Python3 and pip
  apt:
    name:
      - python3
      - python3-pip
    state: present
    update_cache: yes

- name: Install Flask
  pip:
    name: flask
    executable: pip3

- name: Copy Flask app
  copy:
    src: app.py
    dest: "{{ flask_app_dest }}"
    owner: "{{ flask_user }}"

- name: Create Flask environment file
  copy:
    dest: "{{ flask_env_file }}"
    content: |
      DB_USER={{ db_user }}
      DB_PASSWORD={{ db_password }}
    mode: '0600'
    owner: "{{ flask_user }}"

- name: Kill existing Flask process if running
  shell: kill $(cat /tmp/flask.pid) 2>/dev/null || true
  args:
    executable: /bin/bash

- name: Start Flask app
  shell: |
    set -a
    source {{ flask_env_file }}
    set +a
    nohup python3 {{ flask_app_dest }} > {{ flask_log }} 2>&1 &
  args:
    executable: /bin/bash